spring.application.name=study_service
server.port=${SERVER_PORT:8085}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/exam_bank_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:27092005}

spring.jpa.open-in-view=false

logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
# Avoid startup warnings when Hibernate tries to drop missing auto-named unique constraints.
spring.jpa.properties.hibernate.schema_update.unique_constraint_strategy=RECREATE_QUIETLY
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_BIND_LOG_LEVEL:WARN}

server.servlet.context-path=/api/v1/study

auth.jwt.issuer=${JWT_ISSUER:auth_service}
# Base64 secret used by auth_service for HS256 signing
auth.jwt.secret=${JWT_SECRET_BASE64:VjNyeVNlY3VyZVNlY3JldEtleUZvckF1dGhTZXJ2aWNlMTIzNDU2Nzg5MDE=}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
#spring.data.redis.password=${REDIS_PASSWORD:}
#spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}
spring.data.redis.connect-timeout=${REDIS_CONNECT_TIMEOUT:2s}

spring.data.jpa.repositories.enabled=true
spring.data.redis.repositories.enabled=false

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
auth.events.exchange=${AUTH_EVENTS_EXCHANGE:auth.events}
auth.events.user-profile-sync-routing-key=${AUTH_EVENTS_USER_PROFILE_SYNC_ROUTING_KEY:auth.user.profile.sync}
auth.events.user-profile-sync.queue=${AUTH_EVENTS_USER_PROFILE_SYNC_QUEUE:study.auth.user-profile-sync.queue}

# Consume exam submitted events from exam_service via RabbitMQ
exam.events.exchange=${EXAM_EVENTS_EXCHANGE:exam.events}
exam.events.routing-key=${EXAM_EVENTS_ROUTING_KEY:exam.submitted}
study.events.exam-submitted.queue=${STUDY_EXAM_SUBMITTED_QUEUE:study.exam-submitted.queue}
